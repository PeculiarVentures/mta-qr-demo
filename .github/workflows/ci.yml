name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum

      - name: Test
        working-directory: go
        run: go test ./... -count=1 -v

      - name: Build
        working-directory: go
        run: go build ./...

  typescript:
    name: TypeScript service tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install
        working-directory: ts
        run: npm ci

      - name: Type check
        working-directory: ts
        run: npx tsc --noEmit

      - name: Install SDK deps
        working-directory: ts/sdk
        run: npm ci

      - name: Vector and signing tests (SDK)
        working-directory: ts/sdk
        run: npm test

  typescript-sdk:
    name: TypeScript SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: ts/sdk
        run: npm install

      - name: Type check
        working-directory: ts/sdk
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: ts/sdk
        run: npm test

  rust:
    name: Rust SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Test
        working-directory: rust
        run: cargo test

      - name: Build
        working-directory: rust
        run: cargo build

  java:
    name: Java SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Test
        working-directory: java
        run: mvn test -B

  interop:
    name: Interop matrix (Go + TypeScript services)
    runs-on: ubuntu-latest
    needs: [go, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install TypeScript dependencies
        working-directory: ts
        run: npm ci

      - name: Run interop matrix
        run: python3 interop_test.py

  browser-demo:
    name: Browser demo build
    runs-on: ubuntu-latest
    needs: [typescript-sdk]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SDK dependencies
        working-directory: ts/sdk
        run: npm install

      - name: Build SDK bundle
        working-directory: ts/sdk
        run: |
          npx esbuild src/browser-bundle.ts \
            --bundle --format=iife --global-name=__mta_qr \
            --platform=browser --minify \
            --outfile=../../../browser-demo/deps/mta_qr_sdk.iife.js

      - name: Build demo
        working-directory: browser-demo
        run: python3 build.py

      - name: Check output
        run: |
          test -f browser-demo/index.html
          wc -c browser-demo/index.html
